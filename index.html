<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zelda Mobile - Joystick Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#111;overflow:hidden;font-family:Arial,sans-serif;touch-action:none;color:white;width:100vw;height:100vh;}
#gc{position:relative;width:100vw;height:100vh; display: flex;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated; background: #1a3c1a;}

/* UI Superior */
#ui-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;pointer-events:none;z-index:20;}
#hearts{font-size:1.5rem; filter: drop-shadow(2px 2px 2px black);}
#timer{font-size:1.2rem; font-weight:bold; background:rgba(0,0,0,0.5); padding:4px 12px; border-radius:20px;}

/* Área de Joystick (Izquierda) */
#joystick-zone {
    position: absolute; bottom: 0; left: 0; width: 50%; height: 70%;
    z-index: 10; pointer-events: auto;
}
#joystick-base {
    position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
    display: none; transform: translate(-50%, -50%); pointer-events: none;
}
#joystick-stick {
    position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
    background: rgba(255,255,255,0.4); border-radius: 50%;
    transform: translate(-50%, -50%); pointer-events: none;
}

/* Botones de Acción (Derecha) */
#action-zone {
    position: absolute; bottom: 30px; right: 30px; display: flex; gap: 20px; z-index: 10;
}
.btn-act {
    width: 85px; height: 85px; border-radius: 50%; border: 4px solid;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: bold; font-size: 1.2rem; background: rgba(0,0,0,0.3);
}
.btn-atq { border-color: #ef4444; color: #ef4444; }
.btn-def { border-color: #3b82f6; color: #3b82f6; }
.btn-act:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

/* Overlays */
#btn-pause{position:absolute;top:15px;right:20px;width:45px;height:45px;background:rgba(0,0,0,0.5);border:2px solid white;color:white;border-radius:10px;display:flex;justify-content:center;align-items:center;z-index:30;font-size:1.2rem;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:100;text-align:center;}
.overlay h1{font-size:3rem; color:#ef4444; margin-bottom: 20px;}
.overlay button{padding:15px 40px; font-size:1.5rem; background:#4ade80; border:none; border-radius:10px; font-weight:bold;}

#mini-map { position: absolute; top: 70px; right: 20px; width: 100px; height: 100px; border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; opacity: 0.8; }
</style>
</head>
<body>

<div id="gc">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-top">
        <div id="hearts">❤️❤️❤️❤️❤️</div>
        <div id="timer">00:00</div>
    </div>

    <div id="btn-pause">⏸</div>
    <canvas id="mini-map" width="100" height="100"></canvas>

    <div id="joystick-zone">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
    </div>

    <div id="action-zone">
        <div class="btn-act btn-def" id="btn-def">🛡<br><small>DEF</small></div>
        <div class="btn-act btn-atq" id="btn-atq">⚔️<br><small>ATQ</small></div>
    </div>

    <div id="pause-screen" class="overlay">
        <h1 style="color:white">PAUSA</h1>
        <button onclick="togglePause()">REANUDAR</button>
    </div>

    <div id="gameover-screen" class="overlay">
        <h1>GAME OVER</h1>
        <p id="final-score" style="margin-bottom:20px"></p>
        <button onclick="location.reload()">REINTENTAR</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('mini-map');
const mCtx = mCanvas.getContext('2d');
const WORLD = 2000;
let isPaused = false, isGameOver = false;

// Estado del Joystick
const joy = { active: false, startX: 0, startY: 0, currX: 0, currY: 0, dirX: 0, dirY: 0, maxDist: 50 };
const joyZone = document.getElementById('joystick-zone');
const joyBase = document.getElementById('joystick-base');
const joyStick = document.getElementById('joystick-stick');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

const player = { x:1000, y:1000, w:32, h:32, hp:20, dir:'down', inv:0, speed:5, isAttacking:false, atkT:0, isBlocking:false };
let enemies=[], bombs=[], obstacles=[], projectiles=[], explosions=[];
let startTime=Date.now(), totalPaused=0, pauseStart=0, lastSpawn=0;

// Obstáculos
for(let i=0; i<40; i++){
    obstacles.push({
        x: Math.random()*(WORLD-150)+75, y: Math.random()*(WORLD-150)+75,
        w: 70+Math.random()*60, h: 70+Math.random()*60,
        color: Math.random()>0.5?'#1b4332':'#3d3d3d'
    });
}

// --- LOGICA JOYSTICK ---
joyZone.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    joy.active = true;
    joy.startX = t.clientX;
    joy.startY = t.clientY;
    joyBase.style.display = 'block';
    joyBase.style.left = joy.startX + 'px';
    joyBase.style.top = joy.startY + 'px';
}, {passive: false});

joyZone.addEventListener('touchmove', e => {
    if(!joy.active) return;
    const t = e.touches[0];
    const dx = t.clientX - joy.startX;
    const dy = t.clientY - joy.startY;
    const dist = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx);
    
    const moveDist = Math.min(dist, joy.maxDist);
    joy.currX = Math.cos(angle) * moveDist;
    joy.currY = Math.sin(angle) * moveDist;
    
    joyStick.style.transform = `translate(calc(-50% + ${joy.currX}px), calc(-50% + ${joy.currY}px))`;
    
    // Normalizar para el movimiento del jugador
    joy.dirX = joy.currX / joy.maxDist;
    joy.dirY = joy.currY / joy.maxDist;
}, {passive: false});

joyZone.addEventListener('touchend', () => {
    joy.active = false;
    joy.dirX = 0; joy.dirY = 0;
    joyBase.style.display = 'none';
});

// --- ACCIONES ---
const setupAction = (id, property) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); player[property] = true; if(property==='isAttacking') player.atkT = 14; });
    el.addEventListener('touchend', e => { e.preventDefault(); if(property !== 'isAttacking') player[property] = false; });
};
setupAction('btn-atq', 'isAttacking');
setupAction('btn-def', 'isBlocking');

document.getElementById('btn-pause').onclick = togglePause;
function togglePause() {
    isPaused = !isPaused;
    document.getElementById('pause-screen').style.display = isPaused ? 'flex' : 'none';
    if(isPaused) pauseStart = Date.now(); else totalPaused += (Date.now() - pauseStart);
}

function checkColl(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function canMove(x,y,w,h){
    if(x<15 || x+w>WORLD-15 || y<15 || y+h>WORLD-15) return false;
    for(let o of obstacles) if(checkColl({x,y,w,h}, o)) return false;
    return true;
}

function update(){
    if(isPaused || isGameOver) return;
    const now = Date.now();
    const elapsed = Math.floor((now - startTime - totalPaused)/1000);
    document.getElementById('timer').innerText = String(Math.floor(elapsed/60)).padStart(2,'0')+':'+String(elapsed%60).padStart(2,'0');

    // Spawn
    if(now - lastSpawn > 1500 - Math.min(1000, elapsed*10)){
        const ang = Math.random()*Math.PI*2;
        enemies.push({x: player.x+Math.cos(ang)*500, y: player.y+Math.sin(ang)*500, w:30, h:30, type:Math.random()>0.8?'shooter':'chaser', lastS:0});
        if(Math.random()>0.7) bombs.push({x:Math.random()*(WORLD-60)+30, y:Math.random()*(WORLD-60)+30, w:26, h:26, timer:-1});
        lastSpawn = now;
    }

    if(player.inv > 0) player.inv--;

    // Movimiento Joystick
    if(!player.isBlocking && !player.isAttacking && (Math.abs(joy.dirX) > 0.1 || Math.abs(joy.dirY) > 0.1)){
        let nx = player.x + joy.dirX * player.speed;
        let ny = player.y + joy.dirY * player.speed;
        
        if(canMove(nx, player.y, player.w, player.h)) player.x = nx;
        if(canMove(player.x, ny, player.w, player.h)) player.y = ny;
        
        // Determinar dirección cardinal para dibujo
        if(Math.abs(joy.dirX) > Math.abs(joy.dirY)){
            player.dir = joy.dirX > 0 ? 'right' : 'left';
        } else {
            player.dir = joy.dirY > 0 ? 'down' : 'up';
        }
    }

    // Ataque
    if(player.atkT > 0){
        player.atkT--;
        if(player.atkT === 10){ // Impacto en frame 10
            const sArea = {x:player.x-25, y:player.y-25, w:82, h:82};
            enemies = enemies.filter(en => !checkColl(sArea, en));
            bombs.forEach(b => { if(checkColl(sArea, b)) b.timer = 50; });
        }
        if(player.atkT === 0) player.isAttacking = false;
    }

    // Enemigos, Proyectiles, Bombas (Lógica estandar)
    enemies.forEach(en => {
        const d = Math.hypot(player.x-en.x, player.y-en.y);
        if(en.type==='chaser'){
            let vx = ((player.x-en.x)/d)*2.5, vy = ((player.y-en.y)/d)*2.5;
            if(canMove(en.x+vx, en.y, en.w, en.h)) en.x += vx;
            if(canMove(en.x, en.y+vy, en.w, en.h)) en.y += vy;
        } else if(now - en.lastS > 2500){
            const a = Math.atan2(player.y-en.y, player.x-en.x);
            projectiles.push({x:en.x+15, y:en.y+15, vx:Math.cos(a)*6, vy:Math.sin(a)*6});
            en.lastS = now;
        }
        if(checkColl(player, en) && player.inv<=0 && !player.isBlocking){ player.hp--; player.inv=40; }
    });

    bombs = bombs.filter(b=>{
        if(b.timer > 0) b.timer--;
        if(b.timer === 0){ explosions.push({x:b.x+13, y:b.y+13, r:0, maxR:120}); return false; }
        return true;
    });
    
    explosions = explosions.filter(ex=>{
        ex.r += 8;
        if(Math.hypot(player.x+16-ex.x, player.y+16-ex.y) < ex.r && player.inv<=0 && !player.isBlocking){ player.hp-=4; player.inv=50; }
        enemies = enemies.filter(en => Math.hypot(en.x+15-ex.x, en.y+15-ex.y) > ex.r);
        return ex.r < ex.maxR;
    });

    projectiles = projectiles.filter(p=>{
        p.x+=p.vx; p.y+=p.vy;
        if(checkColl({x:p.x,y:p.y,w:10,h:10}, player)){
            if(!player.isBlocking && player.inv<=0){ player.hp--; player.inv=30; }
            return false;
        }
        return p.x>0 && p.x<WORLD && p.y>0 && p.y<WORLD;
    });

    let hStr='';
    for(let i=0;i<5;i++) hStr += player.hp > i*4 ? (player.hp >= (i+1)*4 ? '❤️' : '🧡') : '🖤';
    document.getElementById('hearts').innerText = hStr;

    if(player.hp <= 0 && !isGameOver){
        isGameOver = true;
        document.getElementById('gameover-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = `Resististe ${elapsed} segundos`;
    }
}

// --- DIBUJO ---
function drawSword(){
    if(!player.isAttacking) return;
    const prog = (14 - player.atkT) / 14;
    const arc = Math.PI * 1.2, cur = -arc/2 + arc*prog;
    ctx.save();
    ctx.translate(player.x+16, player.y+16);
    if(player.dir==='up') ctx.rotate(-Math.PI/2);
    else if(player.dir==='down') ctx.rotate(Math.PI/2);
    else if(player.dir==='left') ctx.rotate(Math.PI);
    ctx.rotate(cur);
    ctx.fillStyle='#e0e0e0'; ctx.fillRect(20,-4,35,8);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.moveTo(15,0); ctx.arc(0,0,50,-arc/2,cur,false); ctx.lineTo(0,0); ctx.fill();
    ctx.restore();
}

function drawShield(){
    if(!player.isBlocking) return;
    ctx.save();
    ctx.translate(player.x+16, player.y+16);
    if(player.dir==='up') ctx.rotate(-Math.PI/2);
    else if(player.dir==='down') ctx.rotate(Math.PI/2);
    else if(player.dir==='left') ctx.rotate(Math.PI);
    ctx.fillStyle='#1e3a8a'; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(22,-15); ctx.lineTo(32,-10); ctx.lineTo(32,10); ctx.lineTo(22,15); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const camX = Math.max(0, Math.min(player.x - canvas.width/2, WORLD - canvas.width));
    const camY = Math.max(0, Math.min(player.y - canvas.height/2, WORLD - canvas.height));
    ctx.save();
    ctx.translate(-camX, -camY);

    // Obstaculos y Entidades
    obstacles.forEach(o => { ctx.fillStyle=o.color; ctx.fillRect(o.x,o.y,o.w,o.h); });
    bombs.forEach(b => { ctx.fillStyle=b.timer>0 && b.timer%8<4?'#fff':'#000'; ctx.fillRect(b.x,b.y,b.w,b.h); });
    explosions.forEach(ex => { ctx.fillStyle="rgba(255,100,0,0.5)"; ctx.beginPath(); ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2); ctx.fill(); });
    enemies.forEach(en => { ctx.fillStyle=en.type==='shooter'?'#9c27b0':'#f44336'; ctx.fillRect(en.x,en.y,en.w,en.h); });
    ctx.fillStyle='#ffeb3b'; projectiles.forEach(p => ctx.fillRect(p.x,p.y,10,10));

    // Jugador
    if(player.inv%6 < 3){
        if(player.dir==='up') drawSword();
        ctx.fillStyle='#166534'; ctx.fillRect(player.x,player.y,player.w,player.h);
        ctx.fillStyle='#ffdbac'; ctx.fillRect(player.x+6,player.y+6,20,12);
        if(player.dir!=='up') drawSword();
        drawShield();
    }
    
    ctx.restore();

    // MiniMap
    mCtx.fillStyle='black'; mCtx.fillRect(0,0,100,100);
    const s = 100/WORLD;
    mCtx.fillStyle='green'; mCtx.fillRect(player.x*s-2, player.y*s-2, 4, 4);
    mCtx.fillStyle='red'; enemies.forEach(e => mCtx.fillRect(e.x*s, e.y*s, 2, 2));

    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
