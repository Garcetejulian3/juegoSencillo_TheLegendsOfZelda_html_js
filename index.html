<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zelda Survival - Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:#111;overflow:hidden;font-family:Arial,sans-serif;touch-action:none;color:white;width:100vw;height:100vh;}
#gc{position:relative;width:100vw;height:100vh;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;background:#1a3c1a;}

#ui-top{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:linear-gradient(rgba(0,0,0,0.65),transparent);pointer-events:none;z-index:20;}
#hearts{font-size:1.1rem;letter-spacing:1px;}
#timer{font-size:0.95rem;font-weight:bold;background:rgba(0,0,0,0.55);padding:3px 10px;border-radius:16px;border:1px solid rgba(255,255,255,0.2);}
#btn-pause{width:52px;height:52px;background:rgba(0,0,0,0.55);border:1.5px solid rgba(255,255,255,0.4);color:white;border-radius:10px;display:flex;justify-content:center;align-items:center;font-size:1.2rem;pointer-events:auto;cursor:pointer;}

#mini-map{position:absolute;top:52px;right:12px;width:70px;height:70px;border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;opacity:0.8;background:black;z-index:5;}
#enemy-count{position:absolute;top:52px;left:12px;font-size:0.75rem;background:rgba(0,0,0,0.5);padding:3px 9px;border-radius:14px;z-index:5;pointer-events:none;}

#joystick-zone{position:absolute;bottom:0;left:0;width:50%;height:55%;z-index:10;pointer-events:auto;}
#joystick-base{position:absolute;width:110px;height:110px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);border-radius:50%;display:none;transform:translate(-50%,-50%);pointer-events:none;}
#joystick-stick{position:absolute;top:50%;left:50%;width:44px;height:44px;background:rgba(255,255,255,0.45);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;}

#action-zone{position:absolute;bottom:18%;right:18px;display:flex;flex-direction:column;gap:16px;z-index:10;align-items:flex-end;}
.btn-act{width:72px;height:72px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.1rem;background:rgba(0,0,0,0.45);pointer-events:auto;}
.btn-act small{font-size:0.6rem;letter-spacing:0.5px;opacity:0.85;margin-top:1px;}
.btn-atq{border-color:#ef4444;color:#fca5a5;}
.btn-def{border-color:#3b82f6;color:#93c5fd;}
.btn-act:active{transform:scale(0.88);background:rgba(255,255,255,0.18);}

.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:100;text-align:center;padding:20px;}
.overlay h1{font-size:clamp(1.8rem,7vw,3rem);margin-bottom:14px;text-transform:uppercase;letter-spacing:2px;}
.overlay p{font-size:clamp(0.95rem,3.5vw,1.2rem);color:#ddd;margin-bottom:24px;}
.overlay button{padding:14px 38px;font-size:clamp(1.1rem,4.5vw,1.4rem);background:#4ade80;border:none;border-radius:10px;cursor:pointer;color:black;font-weight:bold;}
.overlay button:active{transform:scale(0.96);}
</style>
</head>
<body>
<div id="gc">
  <canvas id="gameCanvas"></canvas>
  <div id="ui-top">
    <div id="hearts">❤️❤️❤️❤️❤️</div>
    <div id="timer">00:00</div>
  </div>
  <canvas id="mini-map" width="70" height="70"></canvas>
  <div id="enemy-count">👾 0</div>

  <div id="joystick-zone">
    <div id="joystick-base"><div id="joystick-stick"></div></div>
  </div>

  <div id="action-zone">
    <div id="btn-pause">⏸</div>
    <div class="btn-act btn-atq" id="btn-atq">⚔️<br><small>ATACAR</small></div>
    <div class="btn-act btn-def" id="btn-def">🛡<br><small>ESCUDO</small></div>
  </div>

  <div id="pause-screen" class="overlay">
    <h1 style="color:white;">PAUSA</h1>
    <button onclick="togglePause()">▶ CONTINUAR</button>
  </div>
  <div id="gameover-screen" class="overlay">
    <h1 style="color:#ef4444;">HAS CAÍDO</h1>
    <p id="final-score"></p>
    <button onclick="location.reload()">↺ REINTENTAR</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mCanvas = document.getElementById('mini-map');
const mCtx = mCanvas.getContext('2d');
const WORLD = 2000;
let isPaused = false, isGameOver = false;

const joy = { active:false, startX:0, startY:0, dirX:0, dirY:0, maxDist:52 };
const joyZone  = document.getElementById('joystick-zone');
const joyBase  = document.getElementById('joystick-base');
const joyStick = document.getElementById('joystick-stick');

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
window.addEventListener('resize', resize); resize();

const player = { x:1000,y:1000,w:32,h:32,hp:20,dir:'down',inv:0,speed:5,isAttacking:false,atkT:0,atkDuration:14,isBlocking:false };
let enemies=[],bombs=[],obstacles=[],projectiles=[],explosions=[];
let startTime=Date.now(),totalPaused=0,pauseStart=0,lastSpawn=0;

for(let i=0;i<42;i++){
  obstacles.push({
    x:Math.random()*(WORLD-150)+75, y:Math.random()*(WORLD-150)+75,
    w:70+Math.random()*60, h:70+Math.random()*60,
    color:Math.random()>0.5?'#1b4332':'#3d3d3d'
  });
}

joyZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t=e.touches[0];
  joy.active=true; joy.startX=t.clientX; joy.startY=t.clientY;
  joyBase.style.display='block';
  joyBase.style.left=joy.startX+'px'; joyBase.style.top=joy.startY+'px';
},{passive:false});

joyZone.addEventListener('touchmove', e=>{
  if(!joy.active) return;
  const t=e.touches[0];
  const dx=t.clientX-joy.startX, dy=t.clientY-joy.startY;
  const dist=Math.hypot(dx,dy), ang=Math.atan2(dy,dx);
  const d=Math.min(dist,joy.maxDist);
  const cx=Math.cos(ang)*d, cy=Math.sin(ang)*d;
  joyStick.style.transform=`translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px))`;
  joy.dirX=cx/joy.maxDist; joy.dirY=cy/joy.maxDist;
},{passive:false});

const joyReset=()=>{ joy.active=false; joy.dirX=0; joy.dirY=0; joyBase.style.display='none'; joyStick.style.transform='translate(-50%,-50%)'; };
joyZone.addEventListener('touchend', joyReset);
joyZone.addEventListener('touchcancel', joyReset);

const btnAtq = document.getElementById('btn-atq');
const btnDef = document.getElementById('btn-def');
btnAtq.addEventListener('touchstart', e=>{ e.preventDefault(); if(!player.isAttacking&&!player.isBlocking){ player.isAttacking=true; player.atkT=player.atkDuration; }},{passive:false});
btnAtq.addEventListener('touchend', e=>e.preventDefault(),{passive:false});
btnDef.addEventListener('touchstart', e=>{ e.preventDefault(); player.isBlocking=true; },{passive:false});
btnDef.addEventListener('touchend',   e=>{ e.preventDefault(); player.isBlocking=false; },{passive:false});
btnDef.addEventListener('touchcancel',()=>{ player.isBlocking=false; });

const keys={};
window.addEventListener('keydown',e=>keys[e.code]=true);
window.addEventListener('keyup',  e=>keys[e.code]=false);

document.getElementById('btn-pause').onclick = togglePause;
function togglePause(){
  if(isGameOver) return;
  isPaused=!isPaused;
  document.getElementById('pause-screen').style.display=isPaused?'flex':'none';
  if(isPaused) pauseStart=Date.now(); else totalPaused+=(Date.now()-pauseStart);
}

function checkColl(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
function canMove(x,y,w,h){
  if(x<15||x+w>WORLD-15||y<15||y+h>WORLD-15) return false;
  for(let o of obstacles) if(checkColl({x,y,w,h},o)) return false;
  return true;
}

function update(){
  if(isPaused||isGameOver) return;
  const now=Date.now();
  const elapsed=Math.floor((now-startTime-totalPaused)/1000);
  document.getElementById('timer').innerText=String(Math.floor(elapsed/60)).padStart(2,'0')+':'+String(elapsed%60).padStart(2,'0');

  if(now-lastSpawn > Math.max(400,1400-elapsed*10)){
    const ang=Math.random()*Math.PI*2;
    const dist=480+Math.random()*180;
    let ex=Math.max(50,Math.min(WORLD-50,player.x+Math.cos(ang)*dist));
    let ey=Math.max(50,Math.min(WORLD-50,player.y+Math.sin(ang)*dist));
    enemies.push({x:ex,y:ey,w:30,h:30,type:Math.random()>0.78?'shooter':'chaser',lastS:0});
    if(Math.random()>0.65) bombs.push({x:Math.random()*(WORLD-60)+30,y:Math.random()*(WORLD-60)+30,w:24,h:24,timer:-1});
    lastSpawn=now;
  }

  if(player.inv>0) player.inv--;

  if(keys['KeyK']&&!player.isAttacking&&!player.isBlocking){ player.isAttacking=true; player.atkT=player.atkDuration; }
  if(keys['KeyJ']) player.isBlocking=true;

  if(player.atkT>0){
    player.atkT--;
    if(player.atkT<player.atkDuration*0.8&&player.atkT>player.atkDuration*0.2){
      const sArea={x:player.x-25,y:player.y-25,w:82,h:82};
      enemies=enemies.filter(en=>!checkColl(sArea,en));
      bombs.forEach(b=>{ if(checkColl(sArea,b)&&b.timer===-1) b.timer=50; });
    }
    if(player.atkT===0) player.isAttacking=false;
  }

  if(!player.isBlocking&&!player.isAttacking){
    let dx=joy.dirX, dy=joy.dirY;
    if(keys['KeyW']) dy=-1; if(keys['KeyS']) dy=1;
    if(keys['KeyA']) dx=-1; if(keys['KeyD']) dx=1;
    if(Math.abs(dx)>0.08||Math.abs(dy)>0.08){
      let nx=player.x+dx*player.speed, ny=player.y+dy*player.speed;
      if(canMove(nx,player.y,player.w,player.h)) player.x=nx;
      if(canMove(player.x,ny,player.w,player.h)) player.y=ny;
      if(Math.abs(dx)>Math.abs(dy)) player.dir=dx>0?'right':'left';
      else player.dir=dy>0?'down':'up';
    }
  }
  if(!keys['KeyJ']) player.isBlocking = player.isBlocking && !!document.getElementById('btn-def').matches(':active');

  enemies=enemies.filter(en=>{
    const ddx=player.x-en.x, ddy=player.y-en.y;
    const d=Math.hypot(ddx,ddy);
    if(d>1600) return false;
    if(en.type==='chaser'){
      let vx=(ddx/d)*2.6, vy=(ddy/d)*2.6;
      if(canMove(en.x+vx,en.y,en.w,en.h)) en.x+=vx;
      if(canMove(en.x,en.y+vy,en.w,en.h)) en.y+=vy;
    } else if(now-en.lastS>2500&&d<600){
      const a=Math.atan2(ddy,ddx);
      projectiles.push({x:en.x+15,y:en.y+15,vx:Math.cos(a)*6,vy:Math.sin(a)*6});
      en.lastS=now;
    }
    if(checkColl(player,en)&&player.inv<=0&&!player.isBlocking){ player.hp--; player.inv=42; }
    return true;
  });

  bombs=bombs.filter(b=>{
    if(b.timer>0) b.timer--;
    if(b.timer===0){ explosions.push({x:b.x+12,y:b.y+12,r:0,maxR:120}); return false; }
    return true;
  });
  explosions=explosions.filter(ex=>{
    ex.r+=10;
    if(Math.hypot((player.x+16)-ex.x,(player.y+16)-ex.y)<ex.r&&player.inv<=0&&!player.isBlocking){ player.hp-=4; player.inv=55; }
    enemies=enemies.filter(en=>Math.hypot((en.x+15)-ex.x,(en.y+15)-ex.y)>ex.r);
    return ex.r<ex.maxR;
  });
  projectiles=projectiles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(checkColl({x:p.x,y:p.y,w:10,h:10},player)){
      if(!player.isBlocking&&player.inv<=0){ player.hp--; player.inv=32; }
      return false;
    }
    return p.x>0&&p.x<WORLD&&p.y>0&&p.y<WORLD;
  });

  let hStr='';
  for(let i=0;i<5;i++) hStr+=player.hp>i*4?(player.hp>=(i+1)*4?'❤️':'🧡'):'🖤';
  document.getElementById('hearts').innerText=hStr;
  document.getElementById('enemy-count').innerText='👾 '+enemies.length;

  if(player.hp<=0&&!isGameOver){
    isGameOver=true;
    document.getElementById('gameover-screen').style.display='flex';
    document.getElementById('final-score').innerText='Aguantaste '+elapsed+' segundos';
  }
}

function drawSword(){
  if(!player.isAttacking) return;
  const prog=(player.atkDuration-player.atkT)/player.atkDuration;
  const arc=Math.PI*1.2, start=-arc/2, cur=start+arc*prog;
  ctx.save();
  ctx.translate(player.x+16,player.y+16);
  if(player.dir==='up') ctx.rotate(-Math.PI/2);
  else if(player.dir==='down') ctx.rotate(Math.PI/2);
  else if(player.dir==='left') ctx.rotate(Math.PI);
  ctx.rotate(cur);
  ctx.fillStyle='#e0e0e0'; ctx.fillRect(20,-4,35,8);
  ctx.fillStyle='#fff'; ctx.fillRect(25,-2,25,4);
  ctx.fillStyle='#8b4513'; ctx.fillRect(12,-6,8,12);
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.moveTo(15,0); ctx.arc(0,0,50,start,cur,false); ctx.lineTo(0,0); ctx.fill();
  ctx.restore();
}
function drawShield(){
  if(!player.isBlocking) return;
  ctx.save();
  ctx.translate(player.x+16,player.y+16);
  if(player.dir==='up') ctx.rotate(-Math.PI/2);
  else if(player.dir==='down') ctx.rotate(Math.PI/2);
  else if(player.dir==='left') ctx.rotate(Math.PI);
  ctx.fillStyle='#1e3a8a'; ctx.strokeStyle='#93c5fd'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(22,-15); ctx.lineTo(32,-10); ctx.lineTo(32,10); ctx.lineTo(22,15); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}
function drawMiniMap(){
  const s=70/WORLD;
  mCtx.fillStyle='rgba(0,25,0,0.9)'; mCtx.fillRect(0,0,70,70);
  mCtx.fillStyle='#1b4332';
  obstacles.forEach(o=>mCtx.fillRect(o.x*s,o.y*s,Math.max(1,o.w*s),Math.max(1,o.h*s)));
  mCtx.fillStyle='#dc2626';
  enemies.forEach(en=>mCtx.fillRect(en.x*s-1,en.y*s-1,3,3));
  mCtx.fillStyle='#facc15';
  bombs.forEach(b=>mCtx.fillRect(b.x*s,b.y*s,2,2));
  mCtx.fillStyle='#4ade80';
  mCtx.fillRect(player.x*s-2,player.y*s-2,5,5);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const camX=Math.max(0,Math.min(player.x-canvas.width/2,WORLD-canvas.width));
  const camY=Math.max(0,Math.min(player.y-canvas.height/2,WORLD-canvas.height));
  ctx.save(); ctx.translate(-camX,-camY);

  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(let i=0;i<WORLD;i+=100){
    ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,WORLD);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(WORLD,i);ctx.stroke();
  }
  ctx.fillStyle='#222';
  ctx.fillRect(0,0,WORLD,15); ctx.fillRect(0,WORLD-15,WORLD,15);
  ctx.fillRect(0,0,15,WORLD); ctx.fillRect(WORLD-15,0,15,WORLD);

  obstacles.forEach(o=>{ ctx.fillStyle=o.color; ctx.fillRect(o.x,o.y,o.w,o.h); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.strokeRect(o.x,o.y,o.w,o.h); });
  bombs.forEach(b=>{ ctx.fillStyle=b.timer>0&&b.timer%8<4?'#fff':'#f97316'; ctx.fillRect(b.x,b.y,b.w,b.h); ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5; ctx.strokeRect(b.x,b.y,b.w,b.h); });
  explosions.forEach(ex=>{ const gr=ctx.createRadialGradient(ex.x,ex.y,6,ex.x,ex.y,ex.r); gr.addColorStop(0,'rgba(255,200,50,0.75)'); gr.addColorStop(1,'rgba(255,50,0,0)'); ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2); ctx.fill(); });
  enemies.forEach(en=>{ ctx.fillStyle=en.type==='shooter'?'#7e22ce':'#dc2626'; ctx.fillRect(en.x,en.y,en.w,en.h); ctx.fillStyle='#111'; ctx.fillRect(en.x+6,en.y+7,5,5); ctx.fillRect(en.x+19,en.y+7,5,5); });
  ctx.fillStyle='#fbbf24'; projectiles.forEach(p=>ctx.fillRect(p.x,p.y,10,10));

  if(player.inv%6<3){
    if(player.dir==='up') drawSword();
    ctx.fillStyle='#166534'; ctx.fillRect(player.x,player.y,player.w,player.h);
    ctx.fillStyle='#f59e0b'; ctx.fillRect(player.x+4,player.y-4,player.w-8,10);
    ctx.fillStyle='#ffdbac';
    if(player.dir==='down') ctx.fillRect(player.x+6,player.y+6,player.w-12,12);
    else if(player.dir==='left') ctx.fillRect(player.x,player.y+6,8,12);
    else if(player.dir==='right') ctx.fillRect(player.x+player.w-8,player.y+6,8,12);
    if(player.dir!=='up') drawSword();
    drawShield();
  }
  ctx.restore();
  drawMiniMap();
  update();
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
